<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e95420" stroke-width="0.3" opacity="0.1"/>
    </pattern>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e95420" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e95420" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e95420" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ubuntugrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e95420"/>
      <stop offset="100%" stop-color="#c7401c"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" fill="url(#bg3)"/>
  <rect width="1200" height="360" fill="url(#grid3)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="80" r="200" fill="#e95420" opacity="0.03"/>
  <circle cx="200" cy="300" r="160" fill="#e95420" opacity="0.025"/>
  <circle cx="600" cy="380" r="180" fill="#e95420" opacity="0.02"/>

  <!-- Accent line at bottom -->
  <rect x="0" y="357" width="1200" height="3" fill="url(#accent3)"/>

  <!-- Ubuntu Circle of Friends (simplified) -->
  <g transform="translate(105, 50)" filter="url(#glow3)">
    <!-- Three figures arranged in a triangle formation -->
    <!-- Top figure (head + body) -->
    <circle cx="90" cy="50" r="18" fill="none" stroke="#e95420" stroke-width="3" opacity="0.9"/>
    <path d="M90,68 Q90,95 75,110" fill="none" stroke="#e95420" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M90,68 Q90,95 105,110" fill="none" stroke="#e95420" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

    <!-- Bottom-left figure -->
    <circle cx="50" cy="115" r="18" fill="none" stroke="#e95420" stroke-width="3" opacity="0.9"/>
    <path d="M50,133 Q50,160 35,175" fill="none" stroke="#e95420" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M50,133 Q50,160 65,175" fill="none" stroke="#e95420" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

    <!-- Bottom-right figure -->
    <circle cx="130" cy="115" r="18" fill="none" stroke="#e95420" stroke-width="3" opacity="0.9"/>
    <path d="M130,133 Q130,160 115,175" fill="none" stroke="#e95420" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M130,133 Q130,160 145,175" fill="none" stroke="#e95420" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

    <!-- Connecting arcs between figures -->
    <path d="M72,60 Q30,70 42,100" fill="none" stroke="#e95420" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M108,60 Q150,70 138,100" fill="none" stroke="#e95420" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M68,130 Q90,155 112,130" fill="none" stroke="#e95420" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Center circle (optional, part of the logo) -->
    <circle cx="90" cy="105" r="12" fill="none" stroke="#e95420" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Up Arrow / Upgrade Symbol -->
  <g transform="translate(910, 55)" filter="url(#glow3)">
    <!-- Arrow body -->
    <path d="M75,20 L105,60 L92,60 L92,130 L58,130 L58,60 L45,60 Z" fill="none" stroke="#e95420" stroke-width="3" stroke-linejoin="round" opacity="0.85"/>
    <!-- Arrow head accent -->
    <path d="M75,10 L115,60 L95,60" fill="none" stroke="#e95420" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M75,10 L35,60 L55,60" fill="none" stroke="#e95420" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

    <!-- Version indicators -->
    <rect x="40" y="145" width="70" height="22" rx="4" fill="none" stroke="#e95420" stroke-width="1.5" opacity="0.6"/>
    <text x="75" y="161" text-anchor="middle" font-family="monospace" font-size="12" fill="#e95420" opacity="0.8">7.x</text>

    <!-- Small up indicators -->
    <path d="M25,80 L35,65 L45,80" fill="none" stroke="#e95420" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <path d="M105,80 L115,65 L125,80" fill="none" stroke="#e95420" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- Connection particles -->
  <circle cx="370" cy="170" r="3" fill="#e95420" opacity="0.4"/>
  <circle cx="430" cy="130" r="2" fill="#e95420" opacity="0.35"/>
  <circle cx="500" cy="190" r="2.5" fill="#e95420" opacity="0.3"/>
  <circle cx="700" cy="150" r="3" fill="#e95420" opacity="0.4"/>
  <circle cx="770" cy="180" r="2" fill="#e95420" opacity="0.35"/>
  <circle cx="850" cy="140" r="2.5" fill="#e95420" opacity="0.3"/>

  <!-- Dashed connection lines -->
  <line x1="310" y1="170" x2="440" y2="170" stroke="#e95420" stroke-width="1" stroke-dasharray="8,5" opacity="0.2"/>
  <line x1="760" y1="170" x2="900" y2="170" stroke="#e95420" stroke-width="1" stroke-dasharray="8,5" opacity="0.2"/>

  <!-- Terminal / command line hint -->
  <g transform="translate(480, 280)" opacity="0.25">
    <rect x="0" y="0" width="240" height="30" rx="4" fill="none" stroke="#e95420" stroke-width="1"/>
    <text x="12" y="20" font-family="monospace" font-size="12" fill="#e95420">$ sudo do-release-upgrade</text>
  </g>

  <!-- Main Title Text -->
  <text x="600" y="175" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="2">
    Ubuntu + Linux Kernel 7.x
  </text>

  <!-- Subtitle -->
  <text x="600" y="220" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#e95420" opacity="0.85" letter-spacing="4">
    SYSTEM UPGRADE GUIDE
  </text>

  <!-- Decorative line under text -->
  <line x1="380" y1="243" x2="820" y2="243" stroke="#e95420" stroke-width="1" opacity="0.3"/>

  <!-- Corner diamonds -->
  <rect x="375" y="240" width="6" height="6" fill="#e95420" opacity="0.6" transform="rotate(45,378,243)"/>
  <rect x="817" y="240" width="6" height="6" fill="#e95420" opacity="0.6" transform="rotate(45,820,243)"/>
</svg>