<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#58a6ff" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" fill="url(#bg1)"/>
  <rect width="1200" height="360" fill="url(#grid1)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="80" r="180" fill="#58a6ff" opacity="0.03"/>
  <circle cx="950" cy="280" r="120" fill="#58a6ff" opacity="0.04"/>
  <circle cx="200" cy="300" r="100" fill="#58a6ff" opacity="0.03"/>

  <!-- Accent line at bottom -->
  <rect x="0" y="355" width="1200" height="5" fill="url(#accent1)"/>

  <!-- Database Icon (PocketBase) -->
  <g transform="translate(120, 70)" filter="url(#glow1)">
    <!-- Database cylinder -->
    <ellipse cx="60" cy="30" rx="55" ry="18" fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.9"/>
    <path d="M5,30 L5,120" stroke="#58a6ff" stroke-width="2.5" opacity="0.9"/>
    <path d="M115,30 L115,120" stroke="#58a6ff" stroke-width="2.5" opacity="0.9"/>
    <ellipse cx="60" cy="120" rx="55" ry="18" fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.9"/>
    <!-- Database lines -->
    <ellipse cx="60" cy="60" rx="55" ry="18" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="60" cy="90" rx="55" ry="18" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
    <!-- Lightning bolt (JS) -->
    <path d="M50,50 L65,50 L55,75 L70,75 L45,105 L52,80 L38,80 Z" fill="#58a6ff" opacity="0.7"/>
  </g>

  <!-- Docker Whale (simplified) -->
  <g transform="translate(880, 80)" filter="url(#glow1)">
    <!-- Whale body -->
    <ellipse cx="70" cy="140" rx="75" ry="45" fill="#58a6ff" opacity="0.9"/>
    <!-- Whale tail -->
    <path d="M140,140 Q170,110 160,85 Q155,105 145,120 Q155,125 160,140 Q155,155 145,150 Q155,165 160,185 Q170,160 140,140Z" fill="#58a6ff" opacity="0.9"/>
    <!-- Whale eye -->
    <circle cx="40" cy="128" r="4" fill="#fff"/>
    <!-- Containers on top -->
    <rect x="25" y="88" width="18" height="18" rx="2" fill="#58a6ff" stroke="#fff" stroke-width="1.5" opacity="0.95"/>
    <rect x="47" y="88" width="18" height="18" rx="2" fill="#58a6ff" stroke="#fff" stroke-width="1.5" opacity="0.95"/>
    <rect x="69" y="88" width="18" height="18" rx="2" fill="#58a6ff" stroke="#fff" stroke-width="1.5" opacity="0.95"/>
    <rect x="36" y="68" width="18" height="18" rx="2" fill="#58a6ff" stroke="#fff" stroke-width="1.5" opacity="0.95"/>
    <rect x="58" y="68" width="18" height="18" rx="2" fill="#58a6ff" stroke="#fff" stroke-width="1.5" opacity="0.95"/>
    <rect x="47" y="48" width="18" height="18" rx="2" fill="#58a6ff" stroke="#fff" stroke-width="1.5" opacity="0.95"/>
  </g>

  <!-- Connection dots / particles -->
  <circle cx="350" cy="180" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="400" cy="140" r="2" fill="#58a6ff" opacity="0.4"/>
  <circle cx="450" cy="200" r="2.5" fill="#58a6ff" opacity="0.3"/>
  <circle cx="780" cy="160" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="750" cy="200" r="2" fill="#58a6ff" opacity="0.4"/>
  <circle cx="820" cy="130" r="2.5" fill="#58a6ff" opacity="0.3"/>

  <!-- Dashed connection lines -->
  <line x1="290" y1="170" x2="420" y2="170" stroke="#58a6ff" stroke-width="1" stroke-dasharray="6,4" opacity="0.25"/>
  <line x1="780" y1="170" x2="870" y2="170" stroke="#58a6ff" stroke-width="1" stroke-dasharray="6,4" opacity="0.25"/>

  <!-- Thumbs up icon (Like) -->
  <g transform="translate(540, 100)">
    <path d="M30,60 L30,25 Q30,15 40,15 Q50,15 50,25 L50,50 L65,50 Q75,50 75,60 Q75,70 65,75 L55,75 Q55,85 50,90 Q45,95 40,90 L35,85 Q30,80 30,70 Z" fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.8"/>
    <path d="M50,50 L65,50 Q75,50 75,60 L75,70 Q75,80 65,80 L55,80" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Main Title Text -->
  <text x="600" y="230" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="2">
    PocketBase + Docker
  </text>

  <!-- Subtitle -->
  <text x="600" y="275" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#58a6ff" opacity="0.85" letter-spacing="4">
    BLOG LIKE COUNTER WITH JS HOOKS
  </text>

  <!-- Decorative line under text -->
  <line x1="320" y1="295" x2="880" y2="295" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>

  <!-- Small decorative elements -->
  <rect x="315" y="292" width="6" height="6" fill="#58a6ff" opacity="0.6" transform="rotate(45,318,295)"/>
  <rect x="877" y="292" width="6" height="6" fill="#58a6ff" opacity="0.6" transform="rotate(45,880,295)"/>
</svg>
