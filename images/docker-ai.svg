<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#58a6ff" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" fill="url(#bg1)"/>
  <rect width="1200" height="360" fill="url(#grid1)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="80" r="180" fill="#58a6ff" opacity="0.03"/>
  <circle cx="950" cy="280" r="120" fill="#58a6ff" opacity="0.04"/>
  <circle cx="200" cy="300" r="100" fill="#58a6ff" opacity="0.03"/>

  <!-- Accent line at bottom -->
  <rect x="0" y="355" width="1200" height="5" fill="url(#accent1)"/>

  <!-- Docker Whale (simplified) -->
  <g transform="translate(120, 80)" filter="url(#glow1)">
    <!-- Whale body -->
    <ellipse cx="70" cy="140" rx="75" ry="45" fill="#58a6ff" opacity="0.9"/>
    <!-- Whale tail -->
    <path d="M140,140 Q170,110 160,85 Q155,105 145,120 Q155,125 160,140 Q155,155 145,150 Q155,165 160,185 Q170,160 140,140Z" fill="#58a6ff" opacity="0.9"/>
    <!-- Whale eye -->
    <circle cx="40" cy="128" r="4" fill="#fff"/>
    <!-- Containers on top -->
    <rect x="25" y="88" width="18" height="18" rx="2" fill="#58a6ff" stroke="#fff" stroke-width="1.5" opacity="0.95"/>
    <rect x="47" y="88" width="18" height="18" rx="2" fill="#58a6ff" stroke="#fff" stroke-width="1.5" opacity="0.95"/>
    <rect x="69" y="88" width="18" height="18" rx="2" fill="#58a6ff" stroke="#fff" stroke-width="1.5" opacity="0.95"/>
    <rect x="36" y="68" width="18" height="18" rx="2" fill="#58a6ff" stroke="#fff" stroke-width="1.5" opacity="0.95"/>
    <rect x="58" y="68" width="18" height="18" rx="2" fill="#58a6ff" stroke="#fff" stroke-width="1.5" opacity="0.95"/>
    <rect x="47" y="48" width="18" height="18" rx="2" fill="#58a6ff" stroke="#fff" stroke-width="1.5" opacity="0.95"/>
  </g>

  <!-- Brain / AI Symbol -->
  <g transform="translate(880, 70)" filter="url(#glow1)">
    <!-- Brain outline (simplified) -->
    <path d="M60,20 Q30,20 20,45 Q5,50 5,70 Q5,90 25,95 Q20,110 30,125 Q40,140 60,140 Q80,140 90,125 Q100,110 95,95 Q115,90 115,70 Q115,50 100,45 Q90,20 60,20Z" fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.8"/>
    <!-- Brain center line -->
    <path d="M60,25 Q55,80 60,140" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
    <!-- Brain folds -->
    <path d="M30,55 Q50,45 60,55" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
    <path d="M60,55 Q70,45 90,55" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
    <path d="M25,80 Q45,70 60,80" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
    <path d="M60,80 Q75,70 95,80" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
    <!-- Neural nodes -->
    <circle cx="60" cy="10" r="5" fill="#58a6ff" opacity="0.7"/>
    <circle cx="20" cy="35" r="4" fill="#58a6ff" opacity="0.5"/>
    <circle cx="100" cy="35" r="4" fill="#58a6ff" opacity="0.5"/>
    <circle cx="10" cy="70" r="3" fill="#58a6ff" opacity="0.4"/>
    <circle cx="110" cy="70" r="3" fill="#58a6ff" opacity="0.4"/>
    <!-- Circuit lines from brain -->
    <line x1="60" y1="10" x2="60" y2="-5" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
    <line x1="20" y1="35" x2="5" y2="30" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
    <line x1="100" y1="35" x2="115" y2="30" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Connection dots / particles -->
  <circle cx="350" cy="180" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="400" cy="140" r="2" fill="#58a6ff" opacity="0.4"/>
  <circle cx="450" cy="200" r="2.5" fill="#58a6ff" opacity="0.3"/>
  <circle cx="780" cy="160" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="750" cy="200" r="2" fill="#58a6ff" opacity="0.4"/>
  <circle cx="820" cy="130" r="2.5" fill="#58a6ff" opacity="0.3"/>

  <!-- Dashed connection lines -->
  <line x1="290" y1="170" x2="420" y2="170" stroke="#58a6ff" stroke-width="1" stroke-dasharray="6,4" opacity="0.25"/>
  <line x1="780" y1="170" x2="870" y2="170" stroke="#58a6ff" stroke-width="1" stroke-dasharray="6,4" opacity="0.25"/>

  <!-- Main Title Text -->
  <text x="600" y="170" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="2">
    Hermes + OpenWebUI + Docker
  </text>

  <!-- Subtitle -->
  <text x="600" y="215" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#58a6ff" opacity="0.85" letter-spacing="4">
    AI AGENT DEPLOYMENT
  </text>

  <!-- Decorative line under text -->
  <line x1="380" y1="235" x2="820" y2="235" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>

  <!-- Small decorative elements -->
  <rect x="375" y="232" width="6" height="6" fill="#58a6ff" opacity="0.6" transform="rotate(45,378,235)"/>
  <rect x="817" y="232" width="6" height="6" fill="#58a6ff" opacity="0.6" transform="rotate(45,820,235)"/>
</svg>