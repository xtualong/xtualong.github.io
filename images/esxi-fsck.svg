<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#58a6ff" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vmwaregrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6cc342"/>
      <stop offset="100%" stop-color="#4a9e2a"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" fill="url(#bg1)"/>
  <rect width="1200" height="360" fill="url(#grid1)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="80" r="180" fill="#58a6ff" opacity="0.03"/>
  <circle cx="950" cy="280" r="120" fill="#58a6ff" opacity="0.04"/>
  <circle cx="200" cy="300" r="100" fill="#58a6ff" opacity="0.03"/>

  <!-- Accent line at bottom -->
  <rect x="0" y="355" width="1200" height="5" fill="url(#accent1)"/>

  <!-- VMware ESXi Logo (VM cube) -->
  <g transform="translate(70, 45)" filter="url(#glow1)">
    <!-- VM cube - 3D isometric cube -->
    <!-- Top face -->
    <path d="M80,20 L140,50 L80,80 L20,50 Z" fill="none" stroke="#6cc342" stroke-width="2.5" opacity="0.9"/>
    <!-- Left face -->
    <path d="M20,50 L80,80 L80,140 L20,110 Z" fill="none" stroke="#6cc342" stroke-width="2.5" opacity="0.7"/>
    <!-- Right face -->
    <path d="M80,80 L140,50 L140,110 L80,140 Z" fill="none" stroke="#6cc342" stroke-width="2.5" opacity="0.8"/>
    <!-- VM text inside cube -->
    <text x="80" y="105" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="#6cc342" opacity="0.9">VM</text>
    <!-- ESXi label below -->
    <text x="80" y="175" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="#6cc342" opacity="0.7" letter-spacing="3">ESXi</text>
  </g>

  <!-- Ubuntu Logo (Circle of Friends) -->
  <g transform="translate(880, 40)" filter="url(#glow1)">
    <!-- Outer circle -->
    <circle cx="80" cy="80" r="65" fill="none" stroke="#e95420" stroke-width="2.5" opacity="0.8"/>
    <!-- Three friend figures -->
    <!-- Top figure -->
    <circle cx="80" cy="25" r="12" fill="none" stroke="#e95420" stroke-width="2.5" opacity="0.85"/>
    <path d="M80,37 Q80,55 68,65" fill="none" stroke="#e95420" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <path d="M80,37 Q80,55 92,65" fill="none" stroke="#e95420" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <!-- Bottom-left figure -->
    <circle cx="38" cy="115" r="12" fill="none" stroke="#e95420" stroke-width="2.5" opacity="0.85"/>
    <path d="M38,103 Q38,85 50,75" fill="none" stroke="#e95420" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <path d="M38,103 Q38,85 26,75" fill="none" stroke="#e95420" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <!-- Bottom-right figure -->
    <circle cx="122" cy="115" r="12" fill="none" stroke="#e95420" stroke-width="2.5" opacity="0.85"/>
    <path d="M122,103 Q122,85 110,75" fill="none" stroke="#e95420" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <path d="M122,103 Q122,85 134,75" fill="none" stroke="#e95420" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <!-- Connecting arcs -->
    <path d="M68,35 Q30,50 35,75" fill="none" stroke="#e95420" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M92,35 Q130,50 125,75" fill="none" stroke="#e95420" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M50,105 Q80,130 110,105" fill="none" stroke="#e95420" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- 24.04 version badge -->
    <rect x="45" y="155" width="70" height="22" rx="4" fill="none" stroke="#e95420" stroke-width="1.5" opacity="0.6"/>
    <text x="80" y="171" text-anchor="middle" font-family="monospace" font-size="13" fill="#e95420" opacity="0.8">24.04</text>
  </g>

  <!-- Hard Drive / Disk Icon (center-left) -->
  <g transform="translate(310, 60)" filter="url(#glow1)">
    <!-- Drive body -->
    <rect x="0" y="10" width="140" height="100" rx="8" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.7"/>
    <!-- Drive platter -->
    <circle cx="70" cy="55" r="30" fill="none" stroke="#58a6ff" stroke-width="1.8" opacity="0.6"/>
    <circle cx="70" cy="55" r="15" fill="none" stroke="#58a6ff" stroke-width="1.2" opacity="0.4"/>
    <circle cx="70" cy="55" r="4" fill="#58a6ff" opacity="0.7"/>
    <!-- Read/write arm -->
    <line x1="70" y1="55" x2="105" y2="35" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <circle cx="105" cy="35" r="3" fill="#58a6ff" opacity="0.8"/>
    <!-- Status LEDs -->
    <circle cx="20" cy="98" r="3" fill="#58a6ff" opacity="0.8"/>
    <circle cx="35" cy="98" r="3" fill="#58a6ff" opacity="0.4"/>
    <!-- Warning icon overlay -->
    <g transform="translate(100, 70)">
      <path d="M12,0 L24,20 L0,20 Z" fill="none" stroke="#ffa500" stroke-width="1.8" opacity="0.8"/>
      <line x1="12" y1="7" x2="12" y2="14" stroke="#ffa500" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
      <circle cx="12" cy="17" r="1.2" fill="#ffa500" opacity="0.8"/>
    </g>
  </g>

  <!-- Shield / fsck Check Symbol (center-right) -->
  <g transform="translate(690, 55)" filter="url(#glow1)">
    <!-- Shield outline -->
    <path d="M60,5 L110,28 L110,80 Q110,115 60,135 Q10,115 10,80 L10,28 Z" fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.8"/>
    <!-- Check mark -->
    <path d="M35,70 L52,88 L90,45" fill="none" stroke="#58a6ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- Connection dots / particles -->
  <circle cx="300" cy="195" r="3" fill="#58a6ff" opacity="0.45"/>
  <circle cx="380" cy="160" r="2" fill="#58a6ff" opacity="0.35"/>
  <circle cx="460" cy="200" r="2.5" fill="#58a6ff" opacity="0.3"/>
  <circle cx="540" cy="150" r="2" fill="#e95420" opacity="0.3"/>
  <circle cx="620" cy="190" r="3" fill="#58a6ff" opacity="0.4"/>

  <!-- Dashed connection lines -->
  <line x1="260" y1="180" x2="420" y2="180" stroke="#58a6ff" stroke-width="1" stroke-dasharray="6,4" opacity="0.2"/>
  <line x1="580" y1="180" x2="690" y2="180" stroke="#58a6ff" stroke-width="1" stroke-dasharray="6,4" opacity="0.2"/>

  <!-- Terminal hint -->
  <g transform="translate(420, 285)" opacity="0.22">
    <rect x="0" y="0" width="360" height="28" rx="4" fill="none" stroke="#58a6ff" stroke-width="1"/>
    <text x="12" y="19" font-family="monospace" font-size="11" fill="#58a6ff">(initramfs) fsck -y /dev/sda2</text>
  </g>

  <!-- Main Title Text -->
  <text x="600" y="185" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff" letter-spacing="2">
    ESXi + Ubuntu fsck Repair
  </text>

  <!-- Subtitle -->
  <text x="600" y="228" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#58a6ff" opacity="0.85" letter-spacing="4">
    FILESYSTEM RECOVERY GUIDE
  </text>

  <!-- Decorative line under text -->
  <line x1="340" y1="248" x2="860" y2="248" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>

  <!-- Corner diamonds -->
  <rect x="335" y="245" width="6" height="6" fill="#58a6ff" opacity="0.6" transform="rotate(45,338,248)"/>
  <rect x="857" y="245" width="6" height="6" fill="#58a6ff" opacity="0.6" transform="rotate(45,860,248)"/>

  <!-- Bottom accent dots -->
  <circle cx="480" cy="320" r="2" fill="#6cc342" opacity="0.3"/>
  <circle cx="520" cy="330" r="1.5" fill="#e95420" opacity="0.25"/>
  <circle cx="680" cy="325" r="2" fill="#58a6ff" opacity="0.3"/>
  <circle cx="720" cy="315" r="1.5" fill="#58a6ff" opacity="0.25"/>
</svg>
