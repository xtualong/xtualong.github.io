<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>记忆翻牌</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: #fff;
      padding: 10px;
      touch-action: manipulation;
    }
    h1 { margin-bottom: 6px; font-size: 22px; }
    #info { margin-bottom: 10px; font-size: 13px; opacity: 0.85; }
    #stats {
      display: flex; gap: 20px; margin-bottom: 10px; font-size: 14px;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: min(90vw, 360px);
      touch-action: manipulation;
    }
    .card {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(8vw, 36px);
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
      -webkit-user-select: none;
    }
    .card:hover:not(.flipped):not(.matched) {
      background: rgba(255,255,255,0.25);
      transform: scale(1.05);
    }
    .card.flipped {
      background: rgba(255,255,255,0.9);
      border-color: rgba(255,255,255,0.6);
      transform: scale(1.05);
    }
    .card.matched {
      background: rgba(74, 222, 128, 0.3);
      border-color: rgba(74, 222, 128, 0.5);
      cursor: default;
    }
    .card .front { display: none; }
    .card .back { font-size: min(6vw, 24px); opacity: 0.6; }
    .card.flipped .front, .card.matched .front { display: block; }
    .card.flipped .back, .card.matched .back { display: none; }
    #controls { margin-top: 12px; display: flex; gap: 10px; }
    button {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 8px 18px; border-radius: 20px;
      cursor: pointer; font-size: 14px; transition: all 0.3s;
    }
    button:hover { background: rgba(255,255,255,0.4); }
    #message { margin-top: 10px; font-size: 16px; font-weight: bold; min-height: 22px; }
  </style>
</head>
<body>
  <h1>🃏 记忆翻牌</h1>
  <div id="info">翻开两张相同的牌即可消除，全部配对完成即胜利！</div>
  <div id="stats">
    <span>步数: <b id="moves">0</b></span>
    <span>配对: <b id="pairs">0</b>/8</span>
    <span>时间: <b id="timer">0</b>秒</span>
  </div>
  <div id="board"></div>
  <div id="controls">
    <button onclick="initGame()">🔄 重新开始</button>
  </div>
  <div id="message"></div>

  <script>
    const boardEl = document.getElementById('board');
    const movesEl = document.getElementById('moves');
    const pairsEl = document.getElementById('pairs');
    const timerEl = document.getElementById('timer');
    const messageEl = document.getElementById('message');

    const EMOJIS = ['🍎','🍊','🍋','🍇','🍉','🍓','🥝','🍒'];
    let cards, flipped, matched, moves, startTime, timerInterval, locked;

    function initGame() {
      // Create pairs and shuffle
      const deck = [...EMOJIS, ...EMOJIS];
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }

      cards = deck;
      flipped = [];
      matched = new Set();
      moves = 0;
      locked = false;
      messageEl.textContent = '';
      movesEl.textContent = '0';
      pairsEl.textContent = '0';

      if (timerInterval) clearInterval(timerInterval);
      startTime = Date.now();
      timerEl.textContent = '0';
      timerInterval = setInterval(() => {
        timerEl.textContent = Math.floor((Date.now() - startTime) / 1000);
      }, 1000);

      render();
    }

    function render() {
      boardEl.innerHTML = '';
      cards.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        if (matched.has(i)) card.classList.add('matched');
        else if (flipped.includes(i)) card.classList.add('flipped');

        card.innerHTML = `<span class="front">${emoji}</span><span class="back">❓</span>`;
        card.addEventListener('click', () => flipCard(i));
        boardEl.appendChild(card);
      });
    }

    function flipCard(index) {
      if (locked) return;
      if (flipped.includes(index) || matched.has(index)) return;
      if (flipped.length >= 2) return;

      flipped.push(index);
      render();

      if (flipped.length === 2) {
        moves++;
        movesEl.textContent = moves;

        const [a, b] = flipped;
        if (cards[a] === cards[b]) {
          matched.add(a);
          matched.add(b);
          flipped = [];
          pairsEl.textContent = matched.size / 2;
          render();

          if (matched.size === cards.length) {
            clearInterval(timerInterval);
            const secs = Math.floor((Date.now() - startTime) / 1000);
            messageEl.textContent = `🎉 恭喜！${moves} 步完成，用时 ${secs} 秒！`;
          }
        } else {
          locked = true;
          setTimeout(() => {
            flipped = [];
            locked = false;
            render();
          }, 800);
        }
      }
    }

    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, {passive: false});

    initGame();
  </script>
</body>
</html>
